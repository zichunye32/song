<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>冰冰不会碎｜网页歌单</title>
<style>
  :root {
    --bg: #eaf6ff;
    --bg-soft: #f7fbff;
    --panel: rgba(255,255,255,0.72);
    --line: rgba(92, 132, 160, 0.28);
    --text: #5b6670;
    --title: #4f6474;
    --blue: #76c8f4;
    --blue-deep: #62b8ec;
    --grey: #bfc6cd;
    --grey-deep: #9099a3;
    --shadow: 0 14px 34px rgba(93, 153, 194, 0.16);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: "Microsoft YaHei","微软雅黑",sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 30%),
      linear-gradient(180deg, #f6fbff 0%, var(--bg) 38%, #deeffc 100%);
  }
  .cover {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }
  .cover::before, .cover::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(6px);
    opacity: .45;
  }
  .cover::before {
    width: 320px; height: 320px;
    background: rgba(118, 200, 244, 0.18);
    top: -80px; right: -70px;
  }
  .cover::after {
    width: 280px; height: 280px;
    background: rgba(191, 198, 205, 0.16);
    bottom: -60px; left: -60px;
  }
  .avatar-wrap {
    position: relative;
    width: min(82vw, 520px);
    border-radius: 36px;
    padding: 24px;
    background: rgba(255,255,255,0.52);
    backdrop-filter: blur(6px);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.75);
  }
  .avatar-card {
    position: relative;
    border-radius: 28px;
    overflow: hidden;
    background: #f6fbff;
    box-shadow: inset 0 0 0 1px rgba(118,200,244,0.14);
  }
  .avatar-card img {
    display: block;
    width: 100%;
    height: auto;
  }
  .name-tag {
    position: absolute;
    right: 4%;
    bottom: 4%;
    width: 43%;
    min-height: 25%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    white-space: nowrap;
    color: #fff;
    font-family: "FZLanTingHeiS-R-GB","方圆体","Microsoft YaHei",sans-serif;
    font-size: clamp(16px, 2.1vw, 24px);
    line-height: 1;
    letter-spacing: 0;
    padding: 10px 12px;
    border-radius: 18px;
    background: rgba(158, 179, 197, 0.6);
    box-shadow: 0 10px 24px rgba(96, 157, 197, 0.18);
    text-shadow: none;
  }
  .scroll-tip {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: #7192a8;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.64);
    backdrop-filter: blur(4px);
  }
  .main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  .module {
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
    margin-bottom: 28px;
    overflow: hidden;
  }
  .module-inner {
    padding: 26px 26px 20px;
    position: relative;
  }
  .table-module .module-inner {
    padding-top: 26px;
  }
  .ice-sticker {
    position: absolute;
    top: 24px;
    left: 18px;
    width: 34px;
    height: 34px;
    object-fit: contain;
    opacity: 0.96;
    filter: drop-shadow(0 6px 10px rgba(79, 142, 180, 0.10));
    pointer-events: none;
  }
  .section-title {
    margin: 0 0 18px 0;
    padding-left: 40px;
    color: var(--title);
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.2;
    font-family: "FZLanTingHeiS-R-GB","方圆体","Microsoft YaHei",sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .search-box {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1 1 320px;
    min-width: 0;
    height: 52px;
    padding: 0 18px;
    border: 1px solid rgba(118,200,244,0.32);
    background: rgba(255,255,255,0.84);
    border-radius: 16px;
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .search-input:focus {
    border-color: rgba(98,184,236,0.75);
    box-shadow: 0 0 0 4px rgba(118,200,244,0.14);
  }
  .search-btn, .page-btn {
    height: 52px;
    border: none;
    border-radius: 16px;
    padding: 0 20px;
    font-size: 15px;
    cursor: pointer;
    transition: .2s ease;
    font-family: "Microsoft YaHei","微软雅黑",sans-serif;
  }
  .search-btn {
    color: #fff;
    background: linear-gradient(135deg, var(--blue), var(--blue-deep));
    box-shadow: 0 10px 20px rgba(98,184,236,0.2);
  }
  .search-btn:hover, .page-btn:hover {
    transform: translateY(-1px);
  }
  .secondary-btn {
    background: rgba(255,255,255,0.92);
    color: var(--title);
    border: 1px solid rgba(118,200,244,0.22);
  }
  .table-wrap {
    width: 100%;
    overflow-x: auto;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.82);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    background: linear-gradient(180deg, rgba(125,201,246,0.16), rgba(255,255,255,0.9));
    color: var(--title);
    font-family: "FZLanTingHeiS-R-GB","方圆体","Microsoft YaHei",sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: default;
    user-select: none;
    white-space: nowrap;
  }
  .sortable {
    cursor: pointer;
  }
  th, td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tbody td {
    font-family: "Microsoft YaHei","微软雅黑",sans-serif;
    font-size: 15px;
    color: #5f6b75;
  }
  tbody tr:hover {
    background: rgba(118,200,244,0.08);
  }
  tbody tr:last-child td {
    border-bottom: none;
  }
  .song-col { width: 40%; }
  .artist-col { width: 34%; }
  .lang-col { width: 26%; }
  .sc-song-col { width: 34%; }
  .sc-artist-col { width: 28%; }
  .sc-lang-col { width: 18%; }
  .sc-col { width: 20%; }
  .sort-indicator {
    margin-left: 6px;
    font-size: 12px;
    opacity: 0.75;
  }
  .pager {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 8px 4px;
    flex-wrap: wrap;
  }
  .page-btn {
    min-width: 92px;
    color: var(--title);
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(118,200,244,0.24);
  }
  .page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .page-indicator {
    min-width: 250px;
    text-align: center;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(235,247,255,0.95);
    color: #597a90;
    border: 1px solid rgba(118,200,244,0.22);
    font-size: 14px;
  }
  .sc-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 66px;
    padding: 7px 16px;
    border-radius: 999px;
    background: #dbe8f3;
    color: #3f6d9d;
    font-size: 14px;
    line-height: 1;
    border: 1px solid rgba(118,168,205,0.14);
    font-family: "Microsoft YaHei","微软雅黑",sans-serif;
  }
  .song-copy {
    cursor: pointer;
    display: inline-block;
    max-width: 100%;
  }
  .song-copy:hover {
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .copy-toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%);
    background: rgba(78, 107, 130, 0.92);
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 50;
  }
  .copy-toast.show {
    opacity: 1;
  }
  .hidden {
    display: none;
  }
  .empty-state {
    padding: 28px 18px;
    text-align: center;
    color: #718394;
  }
  @media (max-width: 720px) {
    .module-inner { padding: 22px 16px 16px; }
    .table-module .module-inner { padding-top: 22px; }
    .section-title { padding-left: 38px; font-size: 24px; }
    .ice-sticker { width: 30px; height: 30px; top: 20px; left: 12px; }
    th, td { padding: 12px 10px; font-size: 14px; }
    .name-tag { border-radius: 16px; }
  }
</style>
</head>

": "想听", "歌手": "陈奕迅", "语言": "粤语"}, {"歌名": "失忆蝴蝶", "歌手": "陈奕迅", "语言": "粤语"}, {"歌名": "无条件", "歌手": "陈奕迅", "语言": "粤语"}];
  const scSongs = [{"歌名": "搜神记", "歌手": "容祖儿", "语言": "粤语", "sc": "30sc"}, {"歌名": "心之科学", "歌手": "容祖儿", "语言": "粤语", "sc": "30sc"}];
  const pageSize = 50;

  const state = {
    main: {
      sortKey: 'song',
      sortOrder: 'asc',
      page: 1,
      source: mainSongs
    },
    sc: {
      page: 1,
      source: scSongs
    }
  };

  const collator = new Intl.Collator('zh-Hans-CN', { sensitivity: 'base', numeric: true });

  function normalizeText(value) {
    return String(value ?? '').trim();
  }

  function sortData(data, key, order) {
    const keyMap = {
      song: '歌名',
      artist: '歌手',
      lang: '语言'
    };
    const field = keyMap[key];
    return [...data].sort((a, b) => {
      const av = normalizeText(a[field]);
      const bv = normalizeText(b[field]);
      const result = collator.compare(av, bv);
      return order === 'asc' ? result : -result;
    });
  }

  function paginate(data, page, size) {
    const totalPages = Math.max(1, Math.ceil(data.length / size));
    const safePage = Math.min(Math.max(page, 1), totalPages);
    const start = (safePage - 1) * size;
    return {
      rows: data.slice(start, start + size),
      page: safePage,
      totalPages
    };
  }

  function updateSortIndicators() {
    ['song','artist','lang'].forEach(key => {
      const el = document.getElementById(`main-${key}-indicator`);
      if (!el) return;
      if (state.main.sortKey === key) {
        el.textContent = state.main.sortOrder === 'asc' ? '▲' : '▼';
      } else {
        el.textContent = '';
      }
    });
  }

  function renderMainTable() {
    const sorted = sortData(state.main.source, state.main.sortKey, state.main.sortOrder);
    const info = paginate(sorted, state.main.page, pageSize);
    state.main.page = info.page;

    const tbody = document.getElementById('mainTableBody');
    tbody.innerHTML = info.rows.map(row => `
      <tr>
        <td title="${escapeHtml(row['歌名'])}"><span class="song-copy" data-copy="${escapeHtml(row['歌名'])}">${escapeHtml(row['歌名'])}</span></td>
        <td title="${escapeHtml(row['歌手'])}">${escapeHtml(row['歌手'])}</td>
        <td title="${escapeHtml(row['语言'])}">${escapeHtml(row['语言'])}</td>
      </tr>
    `).join('');

    document.getElementById('mainPageIndicator').textContent = `第${info.page}页 / 共${info.totalPages}页 · 本页${info.rows.length}首`;
    document.getElementById('mainPrev').disabled = info.page <= 1;
    document.getElementById('mainNext').disabled = info.page >= info.totalPages;
    updateSortIndicators();
  }

  function renderScTable() {
    const info = paginate(state.sc.source, state.sc.page, pageSize);
    state.sc.page = info.page;
    const tbody = document.getElementById('scTableBody');

    tbody.innerHTML = info.rows.map(row => `
      <tr>
        <td title="${escapeHtml(row['歌名'])}">${escapeHtml(row['歌名'])}</td>
        <td title="${escapeHtml(row['歌手'])}">${escapeHtml(row['歌手'])}</td>
        <td title="${escapeHtml(row['语言'])}">${escapeHtml(row['语言'])}</td>
        <td><span class="sc-badge">${escapeHtml(row['sc'])}</span></td>
      </tr>
    `).join('');

    document.getElementById('scPageIndicator').textContent = `第${info.page}页 / 共${info.totalPages}页 · 本页${info.rows.length}首`;
    document.getElementById('scPrev').disabled = info.page <= 1;
    document.getElementById('scNext').disabled = info.page >= info.totalPages;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function showCopyToast(text) {
    const toast = document.getElementById('copyToast');
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showCopyToast.timer);
    showCopyToast.timer = setTimeout(() => {
      toast.classList.remove('show');
    }, 1200);
  }

  async function copySongName(text) {
    try {
      await navigator.clipboard.writeText(text);
      showCopyToast('已复制歌名');
    } catch (error) {
      const input = document.createElement('textarea');
      input.value = text;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
      showCopyToast('已复制歌名');
    }
  }

  function runSearch() {
    const keyword = normalizeText(document.getElementById('searchInput').value).toLowerCase();
    const module = document.getElementById('searchModule');
    const tbody = document.getElementById('searchTableBody');
    const empty = document.getElementById('searchEmpty');

    if (!keyword) {
      module.classList.add('hidden');
      tbody.innerHTML = '';
      empty.classList.add('hidden');
      return;
    }

    const results = mainSongs.filter(row => {
      const song = normalizeText(row['歌名']).toLowerCase();
      const artist = normalizeText(row['歌手']).toLowerCase();
      const lang = normalizeText(row['语言']).toLowerCase();
      return song.includes(keyword) || artist.includes(keyword) || lang.includes(keyword);
    });

    module.classList.remove('hidden');
    if (results.length === 0) {
      tbody.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    tbody.innerHTML = results.map(row => `
      <tr>
        <td title="${escapeHtml(row['歌名'])}"><span class="song-copy" data-copy="${escapeHtml(row['歌名'])}">${escapeHtml(row['歌名'])}</span></td>
        <td title="${escapeHtml(row['歌手'])}">${escapeHtml(row['歌手'])}</td>
        <td title="${escapeHtml(row['语言'])}">${escapeHtml(row['语言'])}</td>
      </tr>
    `).join('');
    module.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  document.querySelectorAll('.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (state.main.sortKey === key) {
        state.main.sortOrder = state.main.sortOrder === 'asc' ? 'desc' : 'asc';
      } else {
        state.main.sortKey = key;
        state.main.sortOrder = 'asc';
      }
      state.main.page = 1;
      renderMainTable();
    });
  });

  document.getElementById('mainPrev').addEventListener('click', () => {
    if (state.main.page > 1) {
      state.main.page -= 1;
      renderMainTable();
    }
  });
  document.getElementById('mainNext').addEventListener('click', () => {
    state.main.page += 1;
    renderMainTable();
  });
  document.getElementById('scPrev').addEventListener('click', () => {
    if (state.sc.page > 1) {
      state.sc.page -= 1;
      renderScTable();
    }
  });
  document.getElementById('scNext').addEventListener('click', () => {
    state.sc.page += 1;
    renderScTable();
  });

  document.getElementById('searchBtn').addEventListener('click', runSearch);
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    runSearch();
  });
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });
  document.getElementById('searchInput').addEventListener('input', () => {
    const value = normalizeText(document.getElementById('searchInput').value);
    if (!value) runSearch();
  });

  document.addEventListener('click', e => {
    const target = e.target.closest('.song-copy');
    if (!target) return;
    copySongName(target.dataset.copy || target.textContent || '');
  });

  renderMainTable();
  renderScTable();
</script>
